<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>defriends — Log In</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#050c1a;--bg2:#0a1628;--bg3:#0f1e38;
  --cyan:#06b6d4;--green:#22c997;--red:#ef4444;
  --text:#e2e8f0;--text2:#94a3b8;--text3:#64748b;
  --border:#1e3254;
}
body{
  font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  background:var(--bg);color:var(--text);min-height:100vh;
  display:flex;align-items:center;justify-content:center;
  padding:24px;
}
.bg-grid{
  position:fixed;inset:0;z-index:0;
  background-image:linear-gradient(rgba(6,182,212,.04) 1px,transparent 1px),
    linear-gradient(90deg,rgba(6,182,212,.04) 1px,transparent 1px);
  background-size:48px 48px;animation:gridShift 20s linear infinite;
}
@keyframes gridShift{from{background-position:0 0}to{background-position:48px 48px}}
.bg-glow{
  position:fixed;inset:0;z-index:0;pointer-events:none;
  background:radial-gradient(ellipse at 30% 40%,rgba(6,182,212,.08) 0%,transparent 60%);
}

.card{
  position:relative;z-index:1;
  background:var(--bg2);border:1px solid var(--border);border-radius:20px;
  padding:40px;width:100%;max-width:420px;
  box-shadow:0 24px 80px rgba(0,0,0,.4);
  animation:slideUp .5s ease both;
}
@keyframes slideUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}

.logo{
  font-size:22px;font-weight:800;letter-spacing:-.5px;text-align:center;
  background:linear-gradient(135deg,var(--cyan),var(--green));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  margin-bottom:6px;
}
.tagline{font-size:13px;color:var(--text3);text-align:center;margin-bottom:32px}

/* Tabs */
.tabs{display:flex;background:var(--bg3);border-radius:10px;padding:4px;margin-bottom:28px}
.tab{flex:1;padding:8px;border:none;background:none;color:var(--text2);font-size:13px;
  font-weight:600;cursor:pointer;border-radius:8px;transition:all .2s;font-family:inherit}
.tab.active{background:var(--bg2);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,.3)}

.form-group{margin-bottom:18px}
label{display:block;font-size:12px;font-weight:600;color:var(--text2);margin-bottom:6px;letter-spacing:.3px}
input{
  width:100%;padding:11px 14px;border-radius:8px;border:1px solid var(--border);
  background:var(--bg3);color:var(--text);font-size:14px;font-family:inherit;
  transition:border-color .2s,box-shadow .2s;outline:none;
}
input:focus{border-color:var(--cyan);box-shadow:0 0 0 3px rgba(6,182,212,.15)}
input::placeholder{color:var(--text3)}

.btn-submit{
  width:100%;padding:12px;border-radius:8px;border:none;
  background:linear-gradient(135deg,var(--cyan),#0891b2);
  color:#050c1a;font-size:14px;font-weight:700;cursor:pointer;
  transition:all .2s;font-family:inherit;margin-top:4px;
}
.btn-submit:hover{transform:translateY(-1px);box-shadow:0 4px 20px rgba(6,182,212,.35)}
.btn-submit:active{transform:translateY(0)}
.btn-submit:disabled{opacity:.6;cursor:not-allowed;transform:none;box-shadow:none}

.divider{height:1px;background:var(--border);margin:24px 0;position:relative}
.divider span{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  background:var(--bg2);padding:0 10px;font-size:11px;color:var(--text3);
}

.alert{
  padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:16px;
  display:none;animation:fadeIn .3s ease;
}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.alert-error{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:var(--red)}
.alert-success{background:rgba(34,201,151,.1);border:1px solid rgba(34,201,151,.3);color:var(--green)}

.back-link{
  display:block;text-align:center;margin-top:20px;font-size:13px;
  color:var(--text3);text-decoration:none;transition:color .2s;
}
.back-link:hover{color:var(--cyan)}

.pane{display:none}.pane.active{display:block}
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="bg-glow"></div>

<div class="card">
  <div class="logo">defriends</div>
  <div class="tagline">Authorized Device Security Assessment</div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('login')">Log In</button>
    <button class="tab" onclick="switchTab('register')">Register</button>
  </div>

  <div id="alertBox" class="alert"></div>

  <!-- LOGIN PANE -->
  <div id="pane-login" class="pane active">
    <form id="loginForm" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="l-email" placeholder="demo@example.com" required autocomplete="username" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="l-pass" placeholder="••••••••" required autocomplete="current-password" />
      </div>
      <button type="submit" class="btn-submit" id="loginBtn">Log In →</button>
    </form>
  </div>

  <!-- REGISTER PANE -->
  <div id="pane-register" class="pane">
    <form id="registerForm" onsubmit="handleRegister(event)">
      <div class="form-group">
        <label>Name</label>
        <input type="text" id="r-name" placeholder="Demo User" required />
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="r-email" placeholder="demo@example.com" required autocomplete="username" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="r-pass" placeholder="ChangeMe123!" required autocomplete="new-password" />
      </div>
      <button type="submit" class="btn-submit" id="registerBtn">Create Account →</button>
    </form>
  </div>

  <a href="/" class="back-link">← Back to landing page</a>
</div>

<script>
const nextUrl = new URLSearchParams(location.search).get('next') || '/ui';

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active', (i===0&&tab==='login')||(i===1&&tab==='register')));
  document.getElementById('pane-login').classList.toggle('active', tab==='login');
  document.getElementById('pane-register').classList.toggle('active', tab==='register');
  hideAlert();
}

function showAlert(msg, type='error') {
  const el = document.getElementById('alertBox');
  el.textContent = msg;
  el.className = `alert alert-${type}`;
  el.style.display = 'block';
}
function hideAlert() {
  document.getElementById('alertBox').style.display = 'none';
}

async function handleLogin(e) {
  e.preventDefault();
  const btn = document.getElementById('loginBtn');
  btn.disabled = true; btn.textContent = 'Logging in…';
  hideAlert();
  try {
    const res = await fetch('/v1/auth/login', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        email: document.getElementById('l-email').value,
        password: document.getElementById('l-pass').value
      })
    });
    const data = await res.json();
    if (res.ok) {
      showAlert('Login successful — redirecting…', 'success');
      setTimeout(() => { window.location.href = nextUrl; }, 600);
    } else {
      showAlert(data.detail || 'Login failed. Check your credentials.');
      btn.disabled = false; btn.textContent = 'Log In →';
    }
  } catch {
    showAlert('Network error. Is the server running?');
    btn.disabled = false; btn.textContent = 'Log In →';
  }
}

async function handleRegister(e) {
  e.preventDefault();
  const btn = document.getElementById('registerBtn');
  btn.disabled = true; btn.textContent = 'Creating account…';
  hideAlert();
  try {
    const res = await fetch('/v1/auth/register', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        name: document.getElementById('r-name').value,
        email: document.getElementById('r-email').value,
        password: document.getElementById('r-pass').value,
        role: 'user'
      })
    });
    const data = await res.json();
    if (res.ok) {
      showAlert('Account created! Logging you in…', 'success');
      document.getElementById('l-email').value = document.getElementById('r-email').value;
      document.getElementById('l-pass').value = document.getElementById('r-pass').value;
      setTimeout(async () => {
        switchTab('login');
        document.getElementById('loginForm').dispatchEvent(new Event('submit',{cancelable:true,bubbles:true}));
      }, 800);
    } else {
      showAlert(data.detail || 'Registration failed.');
      btn.disabled = false; btn.textContent = 'Create Account →';
    }
  } catch {
    showAlert('Network error. Is the server running?');
    btn.disabled = false; btn.textContent = 'Create Account →';
  }
}
</script>
</body>
</html>
